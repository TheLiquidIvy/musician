# Musicians Portfolio

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musician Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>John Doe - Musician</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#portfolio">Portfolio</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <section id="about">
        <h2>About Me</h2>
        <p>Welcome to my portfolio! I am a passionate musician with a love for creating unique sounds.</p>
    </section>
    <section id="portfolio">
        <h2>My Work</h2>
        <div class="gallery">
            <div class="item"><img src="image1.jpg" alt="Music Piece 1"></div>
            <div class="item"><img src="image2.jpg" alt="Music Piece 2"></div>
            <div class="item"><img src="image3.jpg" alt="Music Piece 3"></div>
        </div>
    </section>
    <section id="contact">
        <h2>Contact Me</h2>
        <form id="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>
    <footer>
        <p>&copy; 2023 John Doe. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
